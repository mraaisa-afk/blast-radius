name: Blast Radius

on:
  pull_request:
    paths:
      - "models/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  impact-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect changed model files
        id: changes
        run: |
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD -- 'models/**' | tr '\n' ' ')
          echo "files=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Run Blast Radius
        if: steps.changes.outputs.files != ''
        env:
          DATAHUB_URL: ${{ secrets.DATAHUB_URL }}
          DATAHUB_TOKEN: ${{ secrets.DATAHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BASE_REF: origin/${{ github.base_ref }}
        run: |
          python blast_radius.py --changed-files ${{ steps.changes.outputs.files }} --output report.md

      - name: Post impact report on the PR
        if: steps.changes.outputs.files != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: report.md
